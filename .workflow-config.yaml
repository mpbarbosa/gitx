# AI Workflow Automation Configuration
# Project: gitx

project:
  name: "gitx"
  type: "typescript-application"
  kind: "nodejs_automation"
  version: "1.1.4"
  description: "Ink-based TypeScript terminal UI for browsing local Git repositories and running folder-scoped Git commands"

tech_stack:
  primary_language: "typescript"
  secondary_languages:
    - "javascript"
  build_system: "npm"
  runtime: "node"
  ui_framework: "ink"
  test_framework: "jest"
  lint_command: "npm run lint"
  lint_commands:
    javascript: "npm run lint:js"
    typescript: "npm run lint:js"
    markdown: "npm run lint:md"

structure:
  source_dirs:
    - src
  docs_dirs: [docs]
  key_docs:
    - README.md
    - ARCHITECTURE.md
    - FUNCTIONAL_REQUIREMENTS.md
    - CHANGELOG.md
    - FLOWCHART.md
    - .github/copilot-instructions.md
  test_dirs: [test]

version:
  config_files:
    - package.json

ai_personas:
  enabled:
    - typescript_reviewer
    - documentation_expert
    - technical_writer
    - architecture_reviewer
    - devops_engineer
    - dependency_analyst
    - test_engineer
    - code_quality_analyst
    - git_specialist
    - async_performance_engineer
    - performance_engineer
  disabled:
    - prompt_engineer
    - ux_analyst
    - accessibility_expert
    - aws_serverless_engineer
    - api_designer
    - security_expert

workflow:
  settings:
    auto_mode: false
    parallel_execution: true
    smart_execution: true
    ml_optimize: false
    multi_stage: false
    auto_commit: false

  stages:
    quick:
      enabled: true
      steps: [step_00, step_01, step_02, step_03, step_04]
    medium:
      enabled: true
      steps: [step_00, step_0b, step_01, step_02, step_02_5, step_03, step_04, step_05, step_06, step_07, step_08, step_09, step_13, step_19, step_20, step_23, step_11]
    full:
      enabled: true
      steps: [step_00, step_0b, step_01, step_02, step_02_5, step_03, step_04, step_05, step_06, step_07, step_08, step_09, step_13, step_19, step_20, step_23, step_11, step_16, step_17, step_0f, step_12]

  steps:
    - id: step_00
      name: "Pre-Analysis"
      file: "step_00.js"
      description: "Analyze the TUI project structure, Git command surfaces, and current workflow scope"
      phase: 1
      enabled: true
      can_parallelize: false
      dependencies: []
      ai_persona: architecture_reviewer

    - id: step_0b
      name: "Bootstrap Documentation"
      file: "step_0b.js"
      description: "Bootstrap project documentation for internal contributors and workflow agents"
      phase: 1
      enabled: true
      can_parallelize: false
      dependencies: [step_00]
      ai_persona: technical_writer

    - id: step_01
      name: "Documentation Updates"
      file: "step_01.js"
      description: "Review and update README, ARCHITECTURE, FUNCTIONAL_REQUIREMENTS, and CHANGELOG"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_00]
      ai_persona: documentation_expert

    - id: step_02
      name: "Consistency Analysis"
      file: "step_02.js"
      description: "Check consistency between documentation, package scripts, and source structure"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_01]
      ai_persona: documentation_expert

    - id: step_02_5
      name: "Documentation Optimization"
      file: "step_02_5.js"
      description: "Consolidate and refine workflow-facing project documentation"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_02]
      ai_persona: technical_writer

    - id: step_03
      name: "Script References"
      file: "step_03.js"
      description: "Validate npm script references for install, vendor sync, build, start, and typecheck"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_02]
      ai_persona: devops_engineer

    - id: step_04
      name: "Config Validation"
      file: "step_04.js"
      description: "Validate package.json, tsconfig.json, and ESM/TypeScript runtime configuration"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_00]
      ai_persona: devops_engineer

    - id: step_05
      name: "Directory Structure"
      file: "step_05.js"
      description: "Validate src/ layout, generated vendor boundaries, and root documentation structure"
      phase: 1
      enabled: true
      can_parallelize: false
      dependencies: [step_04]
      ai_persona: architecture_reviewer

    - id: step_06
      name: "Test Review"
      file: "step_06.js"
      description: "Review committed automated test coverage"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_05]
      ai_persona: test_engineer

    - id: step_07
      name: "Test Generation"
      file: "step_07.js"
      description: "Generate missing tests"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_06]
      ai_persona: test_engineer

    - id: step_08
      name: "Test Execution"
      file: "step_08.js"
      description: "Execute the automated test suite"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_07]
      ai_persona: test_engineer

    - id: step_09
      name: "Dependency Analysis"
      file: "step_09.js"
      description: "Audit Node.js, Ink, React, and TypeScript dependency usage"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_05]
      ai_persona: dependency_analyst

    - id: step_10
      name: "Code Quality"
      file: "step_10.js"
      description: "Run configured lint and code quality checks"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_09]
      ai_persona: code_quality_analyst

    - id: step_13
      name: "Markdown Lint"
      file: "step_13.js"
      description: "Review markdown documentation quality using project markdown conventions"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_09]
      ai_persona: technical_writer

    - id: step_19
      name: "TypeScript Review"
      file: "step_19.js"
      description: "Review TypeScript and Ink patterns, ESM imports, and runtime compatibility"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_09]
      ai_persona: typescript_reviewer

    - id: step_20
      name: "Async Performance Review"
      file: "step_20.js"
      description: "Review async command execution, Git process usage, and UI refresh flow"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_09]
      ai_persona: async_performance_engineer

    - id: step_22
      name: "Accessibility Review"
      file: "step_22.js"
      description: "Accessibility review for web-facing components"
      phase: 2
      enabled: false
      reason: "This repository is a terminal TUI, not an HTML/CSS web application."
      can_parallelize: true
      dependencies: [step_13]
      ai_persona: accessibility_expert

    - id: step_23
      name: "Performance Review"
      file: "step_23.js"
      description: "Review TUI responsiveness, synchronous Git calls, and repository browser performance"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_13]
      ai_persona: performance_engineer

    - id: step_11
      name: "Context Analysis"
      file: "step_11.js"
      description: "Analyze project context, component boundaries, and Git-command-driven workflows"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_13]
      ai_persona: architecture_reviewer

    - id: step_16
      name: "Version Update"
      file: "step_16.js"
      description: "Update package.json and CHANGELOG.md version references when needed"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_11]
      ai_persona: devops_engineer

    - id: step_17
      name: "Workflow Summary"
      file: "step_17.js"
      description: "Generate workflow execution summary and metrics"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_16]
      ai_persona: technical_writer

    - id: step_0f
      name: "Commit Artifacts"
      file: "step_0f.js"
      description: "Commit workflow-generated documentation and artifacts"
      phase: 3
      enabled: true
      can_parallelize: false
      dependencies: [step_17]
      ai_persona: git_specialist

    - id: step_12
      name: "Git Finalization"
      file: "step_12.js"
      description: "Stage, commit, and push final workflow changes using project Git conventions"
      phase: 3
      enabled: true
      can_parallelize: false
      dependencies: [step_0f]
      ai_persona: git_specialist

validation:
  documentation:
    required: true
    min_coverage: 70
  testing:
    required: true

linting:
  js_linter: "eslint"
  js_config: "eslint.config.mjs"
  js_glob: "{src,test}/**/*.{js,jsx,ts,tsx}"
  md_linter: "markdownlint-cli2"
  md_config: ".markdownlint-cli2.jsonc"
  md_glob: "**/*.md"
  md_excludes:
    - "node_modules/**"
    - ".ai_workflow/**"
    - "dist/**"
    - "vendor/**"

git:
  tag_on_run: false
